{% extends 'base.html' %}

{% block title %}
Checkout - Pharmacy
{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    <!-- Page Header -->
    <div class="mb-8">
      <h1 class="text-4xl font-bold text-gray-900 mb-2">Checkout</h1>
      <p class="text-gray-600">Complete your order</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- Checkout Form -->
      <div class="lg:col-span-2">
        <form class="space-y-6">
          <!-- Shipping Information -->
          <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Shipping Address</h2>
            <div class="grid grid-cols-2 gap-4">
              <input type="text" placeholder="First Name" class="col-span-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <input type="text" placeholder="Last Name" class="col-span-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <input type="email" placeholder="Email" class="col-span-2 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <input type="text" placeholder="Address" class="col-span-2 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <input type="text" placeholder="City" class="col-span-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <input type="text" placeholder="Postal Code" class="col-span-1 block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
            </div>
          </div>

          <!-- Payment Information -->
          <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-bold text-gray-900 mb-4">Payment Method</h2>
            <div class="space-y-4">
              <div class="flex items-center">
                <input type="radio" id="card" name="payment" value="card" checked class="w-4 h-4" />
                <label for="card" class="ml-3 text-gray-700">Credit/Debit Card</label>
              </div>
              <div class="flex items-center">
                <input type="radio" id="wallet" name="payment" value="wallet" class="w-4 h-4" />
                <label for="wallet" class="ml-3 text-gray-700">Digital Wallet</label>
              </div>
            </div>
            <div class="mt-4 space-y-4" id="cardDetails">
              <input type="text" placeholder="Card Number" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              <div class="grid grid-cols-2 gap-4">
                <input type="text" placeholder="MM/YY" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
                <input type="text" placeholder="CVC" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent" />
              </div>
            </div>
          </div>
        </form>
      </div>

      <!-- Order Summary -->
      <div>
        <div class="bg-white rounded-lg shadow p-6 sticky top-20">
          <h3 class="text-2xl font-bold text-gray-900 mb-6">Order Summary</h3>
          
          <div class="space-y-4 mb-6 border-b pb-4">
            <div class="flex justify-between text-gray-600">
              <span>Subtotal</span>
              <span>$150.00</span>
            </div>
            <div class="flex justify-between text-gray-600">
              <span>Shipping</span>
              <span>$10.00</span>
            </div>
            <div class="flex justify-between text-gray-600">
              <span>Tax</span>
              <span>$12.80</span>
            </div>
          </div>

          <div class="flex justify-between items-center mb-6">
            <span class="text-xl font-bold text-gray-900">Total</span>
            <span class="text-2xl font-bold text-teal-600">$172.80</span>
          </div>

          <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
            Place Order
          </button>
          <button type="button" class="w-full mt-2 border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-lg transition duration-200">
            Continue Shopping
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
